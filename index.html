<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniBudget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">


  <div id="authScreen" class="auth-gate">
    <h1>UniBudget</h1>
    <h2>Welcome</h2>

    <input type="email" id="authEmail" placeholder="Enter your email">
    <input type="password" id="authPassword" placeholder="Enter your password">

    <button id="loginBtn">Log In</button>
    <button id="signupBtn">Sign Up</button>
    <button id="guestBtn">Continue as Guest</button>

    <p id="authMessage">Choose an option to continue.</p>
  </div>

  <div id="appScreen" style="display: none;">
    <h1>UniBudget</h1>

    <div class="auth-section">
      <h2>Session</h2>
      <p id="sessionStatus">Guest mode</p>
      <button id="logoutBtn">Log Out</button>
    </div>

    <div class="budget-section">
      <h2>Set Monthly Budget</h2>
      <input type="number" id="budgetInput" placeholder="Enter your monthly budget">

      <select id="currencySelect">
        <option value="PLN">PLN</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="TRY">TRY</option>
        <option value="GBP">GBP</option>
      </select>

      <button id="setBudgetBtn">Set Budget</button>
    </div>

    <div class="summary-section">
      <h2>Summary</h2>
      <p>Budget: <span id="budgetAmount">0</span> <span id="currencyLabel">PLN</span></p>
      <p>Total Expenses: <span id="totalExpenses">0</span> <span id="currencyLabel2">PLN</span></p>
      <p>Remaining: <span id="remainingAmount">0</span> <span id="currencyLabel3">PLN</span></p>
    </div>

    <div class="history-section">
      <h2>Monthly History</h2>
      <input type="month" id="historyMonth">
      <button id="showHistoryBtn">Show History</button>
      <div id="historyResult"></div>
    </div>

    <div class="expense-section">
      <h2>Add Expense</h2>

      <input type="text" id="expenseName" placeholder="Choose or enter expense name">

      <select id="expenseCategory">
        <option value="">Select category</option>
        <option value="Market">Market</option>
        <option value="Transport">Transport</option>
        <option value="Food">Food</option>
        <option value="Coffee">Coffee</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Bills">Bills</option>
        <option value="Education">Education</option>
        <option value="Other">Other</option>
      </select>

      <input type="number" id="expenseAmount" placeholder="Expense amount">
      <input type="date" id="expenseDate">

      <button id="addExpenseBtn">Add Expense</button>
      <button id="cancelEditBtn">Cancel Edit</button>
    </div>

    <div class="list-section">
      <h2>Expense List</h2>
      <ul id="expenseList"></ul>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
